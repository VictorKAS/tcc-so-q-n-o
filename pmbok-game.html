<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM BOK – The Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div>
  <img src="/img/plano de fundo.jpg" alt="plano de fundo" style="width:100%;height:100%;">
</div>

<!-- UI OVERLAY -->
<div id="ui">
  <div id="title-block">
    <div id="title-pmbok">PM BOK</div>
    <div id="title-game">The Game</div>
  </div>
  <button id="btn-start" onclick="showCadastroModal()">Começar</button>
  <div id="register-line">
    Faça o login
    <a href="#" onclick="showLoginModal(); return false;">aqui</a>
  </div>
</div>

<!-- SCROLL HINT -->
<div id="scroll-hint">
  <button id="btn-scroll" onclick="window.location.href='guia.html'">Pressione para iniciar</button>
</div>

<!-- MODAL CADASTRO -->
<div id="modal-cadastro-overlay" onclick="handleCadastroOverlayClick(event)">
  <div id="modal">
    <button id="close-modal" onclick="closeCadastroModal()">✕</button>
    <h2>⚔ Criar Conta ⚔</h2>
    <p>Cadastre-se para salvar seu progresso e retomar sua jornada quando quiser.</p>
    <div class="field-group">
      <label>Nome do Herói</label>
      <input type="text" placeholder="Seu nome de aventureiro...">
    </div>
    <div class="field-group">
      <label>E-mail</label>
      <input type="email" placeholder="seu@email.com">
    </div>
    <div class="field-group">
      <label>Senha</label>
      <input type="password" placeholder="••••••••">
    </div>
    <div id="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeCadastroModal()">Cancelar</button>
      <button class="mbtn mbtn-primary">Registrar ✦</button>
    </div>
    <div class="modal-switch">
      Já tem conta? <a href="#" onclick="switchToLogin(); return false;">Fazer login</a>
    </div>
  </div>
</div>
 
<!-- MODAL LOGIN -->
<div id="modal-login-overlay" onclick="handleLoginOverlayClick(event)">
  <div id="modal-login">
    <button class="close-login-btn" onclick="closeLoginModal()">✕</button>
    <h2>⚔ Login ⚔</h2>
    <p>Bem-vindo de volta, aventureiro! Entre para continuar sua jornada.</p>
    <div class="field-group">
      <label>E-mail</label>
      <input type="email" placeholder="seu@email.com">
    </div>
    <div class="field-group">
      <label>Senha</label>
      <input type="password" placeholder="••••••••">
    </div>
    <div id="modal-login-btns">
      <button class="mbtn mbtn-cancel" onclick="closeLoginModal()">Cancelar</button>
      <button class="mbtn mbtn-primary">Entrar ✦</button>
    </div>
    <div class="modal-switch">
      Não tem conta? <a href="#" onclick="switchToCadastro(); return false;">Criar conta</a>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
