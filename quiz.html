<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM BOK – Quiz Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz.css">
</head>
<body>

<!-- ═══ DUNGEON SCENE ═══ -->
<div id="scene">
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"
  viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid slice"
  style="position:absolute;inset:0;">

  <!-- Sky/base -->
  <defs>
    <radialGradient id="ceilGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#1a0830" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06030c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="torchL" cx="22%" cy="42%" r="25%">
      <stop offset="0%"   stop-color="#e07010" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e07010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="torchR" cx="78%" cy="42%" r="25%">
      <stop offset="0%"   stop-color="#e07010" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e07010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="100%" r="50%">
      <stop offset="0%"   stop-color="#180828" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06030c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base wall -->
  <rect x="0" y="0" width="1000" height="620" fill="url(#ceilGlow)"/>

  <!-- Stone brick pattern - back wall -->
  <rect x="0"   y="0"   width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="100" y="0"   width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="200" y="0"   width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="300" y="0"   width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="400" y="0"   width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="500" y="0"   width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="600" y="0"   width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="700" y="0"   width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="800" y="0"   width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="900" y="0"   width="100" height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>

  <rect x="-50" y="40"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="50"  y="40"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="150" y="40"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="250" y="40"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="350" y="40"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="450" y="40"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="550" y="40"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="650" y="40"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="750" y="40"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="850" y="40"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="950" y="40"  width="100" height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>

  <rect x="0"   y="80"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="100" y="80"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="200" y="80"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="300" y="80"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="400" y="80"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="500" y="80"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="600" y="80"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="700" y="80"  width="98"  height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="800" y="80"  width="98"  height="38" fill="#1c1230" rx="1" stroke="#0a0618" stroke-width="1.5"/>
  <rect x="900" y="80"  width="100" height="38" fill="#180e2a" rx="1" stroke="#0a0618" stroke-width="1.5"/>

  <!-- Central Arch -->
  <path d="M360,0 L360,560 L640,560 L640,0 Q640,240 500,240 Q360,240 360,0 Z" fill="#04020a" opacity="0.95"/>
  <path d="M376,0 L376,545 L624,545 L624,0 Q624,228 500,228 Q376,228 376,0 Z" fill="#030108" opacity="0.98"/>

  <!-- Torch Left -->
  <rect x="195" y="155" width="10" height="30" fill="#4a3010"/>
  <rect x="190" y="148" width="20" height="12" rx="2" fill="#5a3818"/>
  <ellipse cx="200" cy="140" rx="9"  ry="14" fill="#e07010" style="animation:flicker 0.13s ease-in-out infinite alternate"/>
  <ellipse cx="200" cy="134" rx="6"  ry="10" fill="#f09820" style="animation:flicker 0.1s ease-in-out 0.05s infinite alternate"/>

  <!-- Torch Right -->
  <rect x="795" y="155" width="10" height="30" fill="#4a3010"/>
  <rect x="790" y="148" width="20" height="12" rx="2" fill="#5a3818"/>
  <ellipse cx="800" cy="140" rx="9"  ry="14" fill="#e07010" style="animation:flicker 0.11s ease-in-out 0.03s infinite alternate"/>
  <ellipse cx="800" cy="134" rx="6"  ry="10" fill="#f09820" style="animation:flicker 0.14s ease-in-out infinite alternate"/>

  <rect x="0" y="0" width="1000" height="620" fill="url(#torchL)"/>
  <rect x="0" y="0" width="1000" height="620" fill="url(#torchR)"/>

  <!-- Floor -->
  <rect x="0" y="540" width="1000" height="80" fill="#100820"/>
  <rect x="0" y="540" width="1000" height="3" fill="#060410"/>
  <rect x="0" y="0" width="1000" height="620" fill="url(#centerGlow)"/>
</svg>
</div>

<!-- ═══ SCANLINES ═══ -->
<div id="scanlines"></div>

<!-- ═══ APP ═══ -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1 id="quiz-title">Quiz Adventure</h1>
    <span id="level-badge">Level 1</span>
  </div>

  <!-- ARENA -->
  <div id="arena">

    <!-- HERO -->
    <div class="fighter" id="hero-fighter">
      <div class="hp-label">vida</div>
      <div class="hp-bar-wrap">
        <div class="hp-bar" id="hero-hp-bar" style="width:100%"></div>
      </div>
      <div class="char-wrap" id="hero-wrap">
        <svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
          <polygon points="40,2 16,46 64,46" fill="#1a60c8"/>
          <rect x="12" y="44" width="56" height="8" rx="3" fill="#2278e8"/>
          <ellipse cx="40" cy="30" rx="5" ry="5" fill="#c040e0"/>
          <ellipse cx="40" cy="30" rx="3" ry="3" fill="#e080ff"/>
          <ellipse cx="40" cy="58" rx="18" ry="16" fill="#f0c890"/>
          <ellipse cx="33" cy="55" rx="3" ry="3.5" fill="#fff"/>
          <ellipse cx="47" cy="55" rx="3" ry="3.5" fill="#fff"/>
          <ellipse cx="33" cy="55" rx="2" ry="2" fill="#3060c0"/>
          <ellipse cx="47" cy="55" rx="2" ry="2" fill="#3060c0"/>
          <ellipse cx="40" cy="70" rx="16" ry="12" fill="#e8e8e8"/>
          <rect x="22" y="74" width="36" height="42" rx="4" fill="#2060c0"/>
          <rect x="37" y="79" width="6" height="33" fill="#1848a0"/>
          <ellipse cx="20" cy="88" rx="5" ry="5" fill="#f0c890"/>
          <ellipse cx="60" cy="88" rx="5" ry="5" fill="#f0c890"/>
          <rect x="63" y="20" width="5" height="80" rx="2" fill="#8B5E3C"/>
          <ellipse cx="65" cy="18" rx="9" ry="9" fill="#c0a030"/>
          <ellipse cx="65" cy="18" rx="6" ry="6" fill="#e0c040"/>
          <ellipse cx="65" cy="18" rx="3" ry="3" fill="#fff8a0"/>
        </svg>
      </div>
      <div class="fighter-name">Heroi</div>
    </div>

    <!-- COLUNA CENTRAL (QUIZ + CARTAS) -->
    <div id="mid-col">
      <!-- QUIZ CARD -->
      <div id="quiz-card">
        <div id="q-label">1 - PMBOK é...</div>
        <div id="q-text">O que é o PMBOK?</div>
        <ul id="options"></ul>
        <div id="card-footer">
          <span id="q-counter">1 / 10</span>
          <button id="btn-confirm" disabled>Confirmar</button>
        </div>
      </div>

      <!-- CARTAS DE SUPORTE -->
      <div id="support-container">
        <div id="support-header">Cartas de Suporte (Escolha e Ative)</div>
        <div id="support-hand"></div>
      </div>
    </div>

    <!-- MONSTER -->
    <div class="fighter" id="monster-fighter">
      <div class="hp-label">vida</div>
      <div class="hp-bar-wrap">
        <div class="hp-bar" id="monster-hp-bar" style="width:100%"></div>
      </div>
      <div class="char-wrap" id="monster-wrap">
        <svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="40" cy="85" rx="24" ry="30" fill="#2a6a20"/>
          <ellipse cx="40" cy="50" rx="22" ry="20" fill="#308a26"/>
          <ellipse cx="18" cy="48" rx="7" ry="10" fill="#2a6a20"/>
          <ellipse cx="62" cy="48" rx="7" ry="10" fill="#2a6a20"/>
          <ellipse cx="31" cy="48" rx="6" ry="6" fill="#cc1010"/>
          <ellipse cx="49" cy="48" rx="6" ry="6" fill="#cc1010"/>
          <polygon points="33,64 30,75 36,64" fill="#e8e0c0"/>
          <polygon points="47,64 44,64 50,75" fill="#e8e0c0"/>
          <rect x="6"  y="78" width="12" height="35" rx="5" fill="#2a6a20"/>
          <rect x="62" y="78" width="12" height="35" rx="5" fill="#2a6a20"/>
        </svg>
      </div>
      <div class="fighter-name">Monstro</div>
    </div>

  </div><!-- /arena -->

  <!-- BOTTOM BAR -->
  <div id="bottombar">
    <button id="btn-back">◀ Voltar</button>
    <span id="feedback"></span>
    <span style="width:80px"></span>
  </div>

</div><!-- /app -->

<!-- ═══ RESULT MODAL ═══ -->
<div id="result-overlay">
  <div id="result-box">
    <div id="result-icon">🏆</div>
    <div id="result-title">Vitória!</div>
    <div id="result-score">0 / 10</div>
    <div id="result-msg"></div>
    <div class="rbtns">
      <button class="rbtn rbtn-main" id="btn-result-close">Jogar Novamente</button>
      <button class="rbtn rbtn-sec"  id="btn-result-back"  onclick="history.back()">◀ Voltar</button>
    </div>
  </div>
</div>

<script src="quiz.js"></script>
</body>
</html>
